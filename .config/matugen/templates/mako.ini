# ==============================================================================
# 9 DUSKY RECORDER INDICATOR
# ==============================================================================
[app-name=dusky-recorder]
anchor=top-right
layer=overlay
width=30
height=30
margin=15,15,0,0
padding=0
border-size=0
icons=0
text-alignment=center
font=monospace 10
format=%s
default-timeout=0
ignore-timeout=1
on-button-left=exec sh -c '$HOME/user_scripts/dusky_recorder/dusky_recorder.sh'
background-color=#00000000
text-color=#ff0000ff
history=0
group-by=

# hex alpha opacity table:
#
# 10% = 1a
# 20% = 33
# 30% = 4d
# 40% = 66
# 50% = 80
# 60% = 99
# 70% = b3
# 80% = cc
# 90% = e6
# 100% = ff
#
# A few extra useful ones for fine tuning Mako transparency:
#
# 5% = 0d
# 15% = 26
# 25% = 40
# 35% = 59
# 45% = 73
# 55% = 8c
# 65% = a6
# 75% = bf
# 85% = d9
# 95% = f2
