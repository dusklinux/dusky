# ==============================================================================
# UNIVERSAL DRIVE MANAGER - CONFIGURATION
# ==============================================================================
# TYPE:
#   "PROTECTED" = Encrypted (LUKS/BitLocker). Requires outer_uuid & inner_uuid.
#   "SIMPLE"    = Standard partition (Ext4/NTFS/Btrfs/etc). Only outer_uuid needed.
#
# UUID GUIDE:
#   outer_uuid = UUID of the raw physical partition (run `lsblk -f` while LOCKED)
#   inner_uuid = UUID of the filesystem inside (run `lsblk -f` while UNLOCKED)
#
# fstype:        Overrides the dynamic probe.
# mount_options: Array of options passed directly to the kernel `mount` syscall.
# ==============================================================================

# --- SOLID STATE DRIVES (SSD) ---

[drives.windows]
type = "SIMPLE"
mountpoint = "/mnt/windows"
outer_uuid = "848A215E8A214E4C"
fstype = "ntfs3"
mount_options = ["noatime", "uid=1000", "gid=1000", "umask=002", "windows_names"]

[drives.browser]
type = "PROTECTED"
mountpoint = "/mnt/browser"
outer_uuid = "0a52e1bb-4fa0-4138-a150-f59467903e22"
inner_uuid = "1adeb61a-0605-4bbc-8178-bb81fe1fca09"
hint = "LAP_P"
fstype = "btrfs"
# Copy-on-Write disabled (nodatacow), which also turns off compression for max speed.
mount_options = ["nodatacow", "ssd", "discard=async", "noatime", "space_cache=v2", "subvol=/"]

[drives.media]
type = "PROTECTED"
mountpoint = "/mnt/media"
outer_uuid = "55d50d6d-a1ed-41d9-ba38-a6542eebbcd9"
inner_uuid = "9C38076638073F30"
hint = "LAP_P"
fstype = "ntfs3"
mount_options = ["noatime", "uid=1000", "gid=1000", "umask=002", "windows_names"]


