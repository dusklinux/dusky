[profile]
name = "Dusk Personal Setup"
description = "Setup environment for personal Dusk machines"
schema_version = 2
post_script_delay = 0

[policy]
audio = true
notify = true
inhibit_sleep = true
task_timeout = 0
stop_on_fail = false
manual = false
force = false

[git]
enabled = true
git_dir = "~/dusky"
work_tree = "~/"
remote = "origin"

[search_dirs]
dirs = [
    "~/user_scripts/arch_setup_scripts/scripts",
    "~/user_scripts/arch_setup_scripts",
    "~/user_scripts/rofi",
    "~/user_scripts/images",
    "~/user_scripts/theme_matugen",
    "~/user_scripts/theme_matugen/config",
    "~/user_scripts/firefox/theme_matugen",
    "~/user_scripts/firefox",
    "~/user_scripts/tts_stt/dusky_kokoro",
    "~/user_scripts/tts_stt/dusky_parakeet",
    "~/user_scripts/nvim",
    "~/user_scripts/mako_osd/dusky_keys",
]

[conflict_resolutions]

[sequence]
scripts = [
    "U | 002_pre_generated_colors.sh",
    "U | 003_network_connect.sh",
    "U | deploy_dotfiles.sh",
    "U | 005_hypr_custom_config_setup.py",
